name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_message:
        description: Custom deploy message shown in the app update banner
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build pages artifact
        env:
          DEPLOY_MESSAGE: ${{ github.event.inputs.deploy_message || github.event.head_commit.message || 'A new app build is available.' }}
          PUSH_API_URL: ${{ secrets.PUSH_API_URL }}
          PUSH_VAPID_PUBLIC_KEY: ${{ secrets.PUSH_VAPID_PUBLIC_KEY }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      PUSH_API_URL: ${{ secrets.PUSH_API_URL }}
      PUSH_API_TOKEN: ${{ secrets.PUSH_API_TOKEN }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send push notification (optional)
        if: ${{ env.PUSH_API_URL != '' && env.PUSH_API_TOKEN != '' }}
        env:
          PUSH_MESSAGE: ${{ github.event.inputs.deploy_message || github.event.head_commit.message || 'A new app build is available.' }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          SAFE_MESSAGE=$(printf '%s' "$PUSH_MESSAGE" | sed 's/\\/\\\\/g; s/"/\\"/g')
          SAFE_URL=$(printf '%s' "$PAGE_URL" | sed 's/\\/\\\\/g; s/"/\\"/g')
          curl -sS -X POST "$PUSH_API_URL/api/push/send" \
            -H "Authorization: Bearer $PUSH_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"title\":\"Dallas Bulls Stats Updated\",\"body\":\"$SAFE_MESSAGE\",\"url\":\"$SAFE_URL\",\"tag\":\"deploy-update\"}"
